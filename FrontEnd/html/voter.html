<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voter Login</title>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-page">

    <div class="login-box">
        <h2>Voter Login</h2>

        <input
            type="text"
            id="voter-id"
            placeholder="Enter Voter ID"
        />

        <input
            type="text"
            id="voter-otp"
            placeholder="Enter OTP"
        />

        <button type="button" id="send-otp-btn">
            Send OTP
        </button>

        <button type="button" id="verify-otp-btn">
            Verify OTP
        </button>

        <p class="back-link" onclick="location.href='index.html'">
            Back to Home
        </p>
    </div>


    <script src="../js/script.js"></script>
    <script src="../js/voter.js"></script>

</body>
</html>
