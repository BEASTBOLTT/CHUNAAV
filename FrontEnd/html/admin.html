<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-page">

    <div class="login-box">
        <h2>Admin Login</h2>

        <input id="admin-id" type="text" placeholder="Enter Admin ID" />
        <input id="admin-otp" type="text" placeholder="Enter OTP" />


        <button type="button" id="send-otp-btn">Send OTP</button>
        <button type="button" id="verify-otp-btn">Verify OTP</button>


        <p class="back-link" onclick="location.href='index.html'">
            Back to Home
        </p>
    </div>

    <script src="../js/script.js"></script>
    <script src="../js/admin.js"></script>

</body>
</html>
